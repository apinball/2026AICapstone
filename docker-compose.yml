services:
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: ai-server
    ports:
      - "8000:8000"
    volumes:
      - ./ai-server/app:/app
      - ai-models:/app/model_weights
    environment:
      - DEVICE=${DEVICE:-cpu}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - HF_TOKEN=${HF_TOKEN:-}
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_SERVER_URL=http://ai-server:8000
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-capstone-audio-bucket}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-counseling-sessions}
      - USE_LOCAL=${USE_LOCAL:-true}
    depends_on:
      - ai-server
    volumes:
      - web-local-storage:/app/backend/local-storage
    networks:
      - capstone-net

networks:
  capstone-net:
    driver: bridge

volumes:
  ai-models:
  web-local-storage:
